{% extends "base.html" %}
{% block title %}Нотатки — Lab 3{% endblock %}

{% block head %}
<style>
  .page-header { margin-bottom: 28px; display:flex; align-items:flex-end; justify-content:space-between; }
  .page-header p { color: var(--muted); margin-top: 4px; font-size: 14px; }

  .add-card { margin-bottom: 24px; }
  .add-card .field { margin-bottom: 14px; }
  .add-row { display:flex; gap:10px; align-items:flex-start; }
  .add-row textarea { flex:1; }

  .notes-list { display: flex; flex-direction: column; gap: 12px; }

  .note-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    animation: fadeUp .3s ease both;
    transition: border-color .2s;
  }
  .note-item:hover { border-color: var(--muted); }
  .note-num {
    font-family: var(--font-head);
    font-size: 11px;
    color: var(--muted);
    min-width: 22px;
    padding-top: 2px;
  }
  .note-text { flex: 1; line-height: 1.6; font-size: 15px; }
  .note-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .2s;
  }
  .note-del:hover { color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 48px;
    color: var(--muted);
  }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }
</style>
{% endblock %}

{% block content %}
<main class="fade-in">
  <div class="page-header">
    <div>
      <h1>Нотатки</h1>
      <p>Нотатки зберігаються в сесії Flask на сервері</p>
    </div>
    <span id="countBadge" style="font-family:var(--font-head);color:var(--muted);font-size:14px;"></span>
  </div>

  <!-- Add note -->
  <div class="card add-card">
    <h3 style="margin-bottom:14px;">Нова нотатка</h3>
    <div id="addAlert" class="alert error" style="margin-bottom:12px;"></div>
    <div class="add-row">
      <div class="field" style="flex:1;">
        <textarea id="noteText" placeholder="Введіть текст нотатки..." rows="3"></textarea>
      </div>
      <button class="btn btn-primary" id="addBtn" onclick="addNote()">Додати</button>
    </div>
  </div>

  <!-- Notes list -->
  <div class="notes-list" id="notesList">
    <div class="empty-state">
      <div class="big">🔄</div>
      <div>Завантаження...</div>
    </div>
  </div>
</main>
{% endblock %}

{% block scripts %}
<script>
  let notes = [];

  async function loadNotes() {
    try {
      const data = await api("/api/notes");
      notes = data.notes;
      render();
    } catch (e) {
      showAlert("addAlert", "Помилка завантаження: " + e.message);
    }
  }

  function render() {
    const list = document.getElementById("notesList");
    const badge = document.getElementById("countBadge");
    badge.textContent = notes.length + " нотат" + (notes.length === 1 ? "ка" : (notes.length < 5 ? "ки" : "ок"));

    if (notes.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="big">📭</div>
          <div>Немає нотаток. Додайте першу!</div>
        </div>`;
      return;
    }

    list.innerHTML = notes.map((n, i) => `
      <div class="note-item" id="note-${n.id}">
        <span class="note-num">#${i + 1}</span>
        <span class="note-text">${escapeHtml(n.text)}</span>
        <button class="note-del" onclick="deleteNote(${n.id})" title="Видалити">✕</button>
      </div>
    `).join("");
  }

  async function addNote() {
    const textarea = document.getElementById("noteText");
    const btn = document.getElementById("addBtn");
    const text = textarea.value.trim();

    btn.innerHTML = '<span class="spin"></span>';
    btn.disabled = true;

    try {
      const data = await api("/api/notes", {
        method: "POST",
        body: JSON.stringify({ text })
      });
      notes.push(data.note);
      textarea.value = "";
      render();
    } catch (e) {
      showAlert("addAlert", e.message);
    } finally {
      btn.innerHTML = "Додати";
      btn.disabled = false;
    }
  }

  async function deleteNote(id) {
    const el = document.getElementById("note-" + id);
    if (el) { el.style.opacity = ".4"; el.style.pointerEvents = "none"; }
    try {
      await api("/api/notes/" + id, { method: "DELETE" });
      notes = notes.filter(n => n.id !== id);
      render();
    } catch (e) {
      showAlert("addAlert", "Помилка видалення: " + e.message);
      if (el) { el.style.opacity = "1"; el.style.pointerEvents = "auto"; }
    }
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // Ctrl+Enter → add
  document.addEventListener("keydown", e => {
    if (e.ctrlKey && e.key === "Enter") addNote();
  });

  loadNotes();
</script>
{% endblock %}
